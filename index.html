<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Contratos y Salarios</title>
    <meta name="description" content="Aplicación PWA para gestión de contratos, facturas y pagos">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Pantalla de carga -->
    <div id="loading" class="loading-screen">
        <div class="loader"></div>
        <p>Cargando aplicación...</p>
    </div>

    <!-- Modal de selección de empresa -->
    <div id="companyModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-building"></i> Seleccionar Empresa</h2>
            <div id="companyList" class="company-list"></div>
            <button id="newCompanyBtn" class="btn btn-primary">
                <i class="fas fa-plus"></i> Nueva Empresa
            </button>
        </div>
    </div>

    <!-- Modal de nueva empresa -->
    <div id="newCompanyModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-plus-circle"></i> Nueva Empresa</h2>
            <form id="newCompanyForm">
                <div class="form-group">
                    <label for="companyName">Nombre de la Empresa:</label>
                    <input type="text" id="companyName" required>
                </div>
                <div class="form-group">
                    <label for="companyRUC">RUC/Identificación:</label>
                    <input type="text" id="companyRUC">
                </div>
                <div class="form-group">
                    <label for="defaultSalaryPercentage">Porcentaje de Salario (%):</label>
                    <input type="number" id="defaultSalaryPercentage" value="30" min="1" max="100" step="0.1" required>
                </div>
                <div class="button-group">
                    <button type="button" id="cancelNewCompany" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Crear Empresa</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Layout principal -->
    <div id="app" class="hidden">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <button id="menuToggle" class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 id="currentCompanyName">Gestión de Contratos</h1>
            </div>
            <div class="header-right">
                <span id="connectionStatus" class="connection-status offline">
                    <i class="fas fa-wifi-slash"></i> Offline
                </span>
                <button id="changeCompanyBtn" class="btn btn-icon" title="Cambiar empresa">
                    <i class="fas fa-exchange-alt"></i>
                </button>
                <button id="syncBtn" class="btn btn-icon" title="Sincronizar">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>Menú</h3>
                <button class="close-sidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" data-section="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="#" data-section="contratos"><i class="fas fa-file-contract"></i> Contratos</a></li>
                <li><a href="#" data-section="certificaciones"><i class="fas fa-certificate"></i> Certificaciones</a></li>
                <li><a href="#" data-section="pagos"><i class="fas fa-money-check-alt"></i> Pagos</a></li>
                <li><a href="#" data-section="facturas"><i class="fas fa-file-invoice-dollar"></i> Facturas</a></li>
                <li><a href="#" data-section="salarios"><i class="fas fa-user-tie"></i> Salarios</a></li>
                <li><a href="#" data-section="reportes"><i class="fas fa-chart-bar"></i> Reportes</a></li>
                <li><a href="#" data-section="backup"><i class="fas fa-database"></i> Backup</a></li>
                <li><a href="#" data-section="configuracion"><i class="fas fa-cog"></i> Configuración</a></li>
            </ul>
        </nav>

        <!-- Contenido principal -->
        <main class="main-content">
            <div id="content"></div>
        </main>

        <!-- Notificaciones -->
        <div id="notification" class="notification hidden"></div>
    </div>

    <!-- Scripts -->
    <script src="libs/xlsx.full.min.js"></script>
    <script src="libs/jspdf.umd.min.js"></script>
    <script src="libs/jspdf-autotable.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/export.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado'))
                    .catch(err => console.log('Error registrando SW:', err));
            });
        }
    </script>
</body>
</html>
